<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="todo-box">

            <h1>Kawaii TodoList</h1>

            <div class="add-task">

                <button>   +   </button>
            </div>

            <p class="success">Tasks added successfully.</p>


            <div class="task">
                <span>Go to market.</span>
                <div class="icons">
                    <span>🖍</span>
                    <span> ✖</span>
                </div>
            </div>

            <div class="task">
                <span>to practice code</span>
                <div class="icons">
                    <span>🖍</span>
                    <span> ✖</span>
                </div>
            </div>


            <div class="task">
                <span>to learn new hadith</span>
                <div class="icons">
                    <span>🖍</span>
                    <span> ✖</span>
                </div>
            </div>


            <div class="task">
                <span>to learn arabic</span>
                <div class="icons">
                    <span>🖍</span>
                    <span> ✖</span>
                </div>
            </div>


            <!-- <img src="assets/bunny.jpg" class="bunny" alt="bunny"> -->
            <img src="assets/bunny.png" class="bunny" alt="bunny">
            


        </div>

    </div>


</body>
</html>
